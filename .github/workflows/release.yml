name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rpm:
    name: Build RPM (Fedora)
    runs-on: ubuntu-latest
    container: fedora:42
    steps:
      - name: Install build dependencies
        run: dnf install -y cargo rust gcc-c++ qt6-qtbase-devel qt6-qtdeclarative-devel rpm-build tar gzip

      - uses: actions/checkout@v4

      - name: Build RPM
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          TOPDIR="$PWD/rpmbuild"
          mkdir -p "$TOPDIR/SOURCES"
          tar czf "$TOPDIR/SOURCES/pnotepad-$VERSION.tar.gz" \
            --transform "s,^,pnotepad-$VERSION/," \
            --exclude=target --exclude=.git --exclude=rpmbuild .
          rpmbuild -ba packaging/pnotepad.spec --define "_topdir $TOPDIR"
          cp "$TOPDIR"/RPMS/x86_64/pnotepad-*.rpm pnotepad-x86_64.rpm

      - uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: pnotepad-x86_64.rpm

  appimage:
    name: Build AppImage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev qt6-declarative-dev libgl1-mesa-dev libfuse2t64 \
            qml6-module-qtquick qml6-module-qtquick-controls \
            qml6-module-qtquick-layouts qml6-module-qtquick-dialogs \
            qml6-module-qtquick-templates qml6-module-qtquick-window \
            qml6-module-qtqml-workerscript

      - name: Build binary
        run: cargo build --release --locked

      - name: Build AppImage
        env:
          QMAKE: /usr/bin/qmake6
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          curl -fLO https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fLO https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          export QML_SOURCES_PATHS="$PWD/qml"
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            -e target/release/pnote \
            -d data/pnote.desktop \
            -i data/icons/pnote.png \
            --plugin qt \
            --output appimage
          OUT=$(ls pnote*.AppImage | head -n1)
          if [ "$OUT" != "pnote-x86_64.AppImage" ]; then mv "$OUT" pnote-x86_64.AppImage; fi

      - name: Smoke test
        run: APPIMAGE_EXTRACT_AND_RUN=1 ./pnote-x86_64.AppImage --version

      - uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: pnote-x86_64.AppImage

  release:
    name: Publish release
    needs: [rpm, appimage]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            pnotepad-x86_64.rpm
            pnote-x86_64.AppImage
